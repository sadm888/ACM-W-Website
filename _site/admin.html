<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/font.css">
  <link rel="stylesheet" href="css/colour.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Raleway', sans-serif;
      background: #f4f6f9;
      color: #333;
    }

    .admin-header {
      background: #2B2B2B;
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .admin-header h1 { color: #4AAEE4; font-size: 18px; margin: 0; letter-spacing: 1px; }
    .btn-back { color: #aaa; text-decoration: none; font-size: 13px; transition: color 0.2s; }
    .btn-back:hover { color: #fff; }

    .admin-body {
      max-width: 1100px;
      margin: 36px auto;
      padding: 0 24px;
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 32px;
      align-items: start;
    }

    .status-bar {
      grid-column: 1 / -1;
      background: #fff;
      border-radius: 10px;
      padding: 14px 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }
    .status-info { font-size: 14px; color: #555; }
    .status-info strong { color: #333; }
    .save-indicator { font-size: 13px; font-weight: 600; color: #4AAEE4; display: flex; align-items: center; gap: 6px; opacity: 0; transition: opacity 0.3s ease; }

    .section-title {
      font-size: 16px; font-weight: 700; color: #2B2B2B;
      margin: 0 0 16px; padding-bottom: 8px;
      border-bottom: 2px solid #4AAEE4;
    }
    .section-note { font-weight: 400; color: #aaa; font-size: 13px; }

    .members-panel { background: #fff; border-radius: 10px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
    .member-list { display: flex; flex-direction: column; gap: 12px; }

    .member-row {
      display: flex; align-items: center; gap: 14px;
      background: #f9f9f9; border: 1px solid #eee;
      border-radius: 8px; padding: 12px 16px;
      transition: border-color 0.2s;
    }
    .member-row.editing { border-color: #4AAEE4; background: #eef7fd; }
    .member-row img { width: 52px; height: 52px; border-radius: 8px; object-fit: cover; flex-shrink: 0; background: #ddd; }
    .member-info { flex: 1; min-width: 0; }
    .m-name { font-weight: 700; font-size: 15px; }
    .m-role { font-size: 12px; color: #888; margin-top: 2px; }
    .member-actions { display: flex; gap: 8px; flex-shrink: 0; }

    .btn-icon {
      width: 32px; height: 32px; border: none; border-radius: 6px;
      cursor: pointer; font-size: 13px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .btn-edit   { background: #e8f4fd; color: #4AAEE4; }
    .btn-edit:hover { background: #4AAEE4; color: #fff; }
    .btn-delete { background: #fdeaea; color: #e05252; }
    .btn-delete:hover { background: #e05252; color: #fff; }

    .drag-handle { cursor: grab; color: #ccc; font-size: 16px; padding: 0 4px; }
    .drag-handle:active { cursor: grabbing; }
    .member-row.dragging { opacity: 0.4; }
    .member-row.drag-over { border-color: #4AAEE4; border-style: dashed; }

    .form-panel {
      background: #fff; border-radius: 10px; padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      position: sticky; top: 24px;
    }
    .form-title { font-size: 16px; font-weight: 700; color: #2B2B2B; margin: 0 0 16px; padding-bottom: 8px; border-bottom: 2px solid #4AAEE4; }

    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 12px; font-weight: 700; color: #555; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-label-note { font-weight: 400; color: #aaa; text-transform: none; letter-spacing: 0; }

    .form-group input[type="text"],
    .form-group input[type="url"] {
      width: 100%; padding: 9px 12px;
      border: 1px solid #ddd; border-radius: 6px;
      font-size: 14px; font-family: 'Raleway', sans-serif;
      transition: border-color 0.2s; outline: none;
    }
    .form-group input:focus { border-color: #4AAEE4; }

    .hidden-file-input { display: none; }
    .photo-zone {
      position: relative; width: 100%; height: 160px;
      border: 2px dashed #ddd; border-radius: 8px;
      cursor: pointer; overflow: hidden; background: #f9f9f9;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.2s;
    }
    .photo-zone:hover { border-color: #4AAEE4; }
    .photo-zone.has-photo { border-style: solid; border-color: #4AAEE4; }
    .photo-zone-img {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; display: none;
    }
    .photo-zone.has-photo .photo-zone-img { display: block; }
    .photo-zone-placeholder {
      display: flex; flex-direction: column; align-items: center;
      gap: 8px; color: #bbb; font-size: 13px; pointer-events: none;
    }
    .photo-zone.has-photo .photo-zone-placeholder { display: none; }
    .photo-zone-placeholder i { font-size: 30px; }
    .old-photo-note {
      font-size: 12px; color: #e07a00; background: #fff8ee;
      border: 1px solid #ffd080; border-radius: 6px;
      padding: 8px 12px; margin-top: 8px; display: none;
    }
    .status-bar-right { display: flex; align-items: center; gap: 12px; }
    .btn-add-member {
      background: #4AAEE4; color: #fff; border: none;
      border-radius: 6px; padding: 8px 16px; font-size: 13px; font-weight: 700;
      font-family: 'Raleway', sans-serif; cursor: pointer;
      transition: background 0.2s; display: flex; align-items: center; gap: 6px;
    }
    .btn-add-member:hover { background: #2e97d4; }

    .form-actions { display: flex; gap: 10px; margin-top: 20px; }
    .btn-save {
      flex: 1; background: #4AAEE4; color: #fff;
      border: none; border-radius: 6px; padding: 11px;
      font-size: 14px; font-weight: 700; font-family: 'Raleway', sans-serif;
      cursor: pointer; transition: background 0.2s;
    }
    .btn-save:hover { background: #2e97d4; }
    .btn-cancel {
      background: #f0f0f0; color: #555; border: none;
      border-radius: 6px; padding: 11px 16px; font-size: 14px;
      font-family: 'Raleway', sans-serif; cursor: pointer;
      transition: background 0.2s; display: none;
    }
    .btn-cancel:hover { background: #ddd; }
    .btn-cancel.visible { display: block; }

    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: #2B2B2B; color: #fff;
      padding: 12px 20px; border-radius: 8px; font-size: 14px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      transform: translateY(80px); opacity: 0;
      transition: all 0.3s ease; z-index: 999;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-left: 4px solid #4AAEE4; }
    .toast.error   { border-left: 4px solid #e05252; }

    .empty-state { text-align: center; padding: 40px 0; color: #aaa; font-size: 14px; }
    .empty-state i { font-size: 32px; margin-bottom: 10px; display: block; }
  </style>
</head>
<body>

  <div class="admin-header">
    <h1>&#9881; Admin</h1>
    <a href="index.html" class="btn-back"><i class="fa fa-arrow-left"></i> &nbsp;Back to site</a>
  </div>

  <div class="admin-body">

    <div class="status-bar">
      <div class="status-info"><strong id="memberCount">0</strong> members</div>
      <div class="status-bar-right">
        <button type="button" class="btn-add-member" onclick="resetForm(); document.querySelector('.form-panel').scrollIntoView({ behavior: 'smooth' });">
          <i class="fa fa-plus"></i> Add Member
        </button>
        <div class="save-indicator" id="saveIndicator"><i class="fa fa-circle-check"></i> Saved</div>
      </div>
    </div>

    <div class="members-panel">
      <div class="section-title">Current Members <span class="section-note">— drag to reorder</span></div>
      <div class="member-list" id="memberList"></div>
    </div>

    <div class="form-panel">
      <div class="form-title" id="formTitle">Add New Member</div>
      <input type="hidden" id="editIndex" value="-1">

      <div class="form-group">
        <label class="form-label" for="fName">Full Name</label>
        <input type="text" id="fName" placeholder="e.g. Priya Sharma">
      </div>
      <div class="form-group">
        <label class="form-label" for="fRole">Role</label>
        <input type="text" id="fRole" placeholder="e.g. Chairperson">
      </div>
      <div class="form-group">
        <label class="form-label">Photo</label>
        <div class="photo-zone" id="photoZone" onclick="document.getElementById('fPhotoFile').click()" title="Click to upload photo">
          <img class="photo-zone-img" id="photoPreview" src="" alt="Member photo">
          <div class="photo-zone-placeholder">
            <i class="fa fa-camera"></i>
            <span>Click to upload</span>
          </div>
          <input type="file" id="fPhotoFile" accept="image/*" class="hidden-file-input" aria-label="Upload member photo" onchange="handlePhotoUpload(this)">
        </div>
        <div class="old-photo-note" id="oldPhotoNote"></div>
      </div>
      <div class="form-group">
        <label class="form-label" for="fLinkedin">LinkedIn URL</label>
        <input type="url" id="fLinkedin" placeholder="https://linkedin.com/in/...">
      </div>
      <div class="form-group">
        <label class="form-label" for="fInstagram">Instagram URL</label>
        <input type="url" id="fInstagram" placeholder="https://instagram.com/...">
      </div>

      <div class="form-actions">
        <button type="button" class="btn-save" onclick="saveMember()">
          <i class="fa fa-check"></i> &nbsp;<span id="saveLabel">Add Member</span>
        </button>
        <button type="button" class="btn-cancel" id="cancelBtn" onclick="cancelEdit()">Cancel</button>
      </div>
    </div>

  </div>

  <div class="toast" id="toast"></div>

<script>
  const STORAGE_KEY = "acmw_members";
  const STORAGE_VER = "v2"; // bump this if member data schema changes
  let members = [];
  let dragSrc = null;
  let currentPhotoData = null; // base64 for newly uploaded photo in form

  // ── Load: use localStorage only if version matches, else fetch fresh ──
  const stored    = localStorage.getItem(STORAGE_KEY);
  const storedVer = localStorage.getItem(STORAGE_KEY + "_ver");
  if (stored && storedVer === STORAGE_VER) {
    members = JSON.parse(stored);
    renderList();
  } else {
    localStorage.removeItem(STORAGE_KEY);
    fetch("members.json")
      .then(r => r.json())
      .then(data => { members = data; persist(); renderList(); })
      .catch(() => { members = []; renderList(); });
  }

  // ── Persist to localStorage ───────────────────────────
  let _saveTimer = null;
  function persist() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(members));
    localStorage.setItem(STORAGE_KEY + "_ver", STORAGE_VER);
    const ind = document.getElementById("saveIndicator");
    ind.style.opacity = '1';
    clearTimeout(_saveTimer);
    _saveTimer = setTimeout(() => { ind.style.opacity = '0'; }, 2000);
  }

  // ── Render ────────────────────────────────────────────
  function renderList() {
    const list = document.getElementById("memberList");
    document.getElementById("memberCount").textContent = members.length;

    if (members.length === 0) {
      list.innerHTML = `<div class="empty-state"><i class="fa fa-users"></i>No members yet. Add one using the form.</div>`;
      return;
    }

    list.innerHTML = members.map((m, i) => `
      <div class="member-row" draggable="true" data-index="${i}"
           ondragstart="onDragStart(event,${i})" ondragover="onDragOver(event)"
           ondrop="onDrop(event,${i})" ondragleave="onDragLeave(event)" ondragend="onDragEnd(event)">
        <span class="drag-handle" title="Drag to reorder"><i class="fa fa-grip-vertical"></i></span>
        <img src="${m.photo}" alt="${m.name}" onerror="this.src='images/members/dummy.jpg'">
        <div class="member-info">
          <div class="m-name">${m.name}</div>
          <div class="m-role">${m.role}</div>
        </div>
        <div class="member-actions">
          <button type="button" class="btn-icon btn-edit" title="Edit" onclick="editMember(${i})"><i class="fa fa-pen"></i></button>
          <button type="button" class="btn-icon btn-delete" title="Delete" onclick="deleteMember(${i})"><i class="fa fa-trash"></i></button>
        </div>
      </div>
    `).join("");
  }

  // ── Save ──────────────────────────────────────────────
  function saveMember() {
    const name      = document.getElementById("fName").value.trim();
    const role      = document.getElementById("fRole").value.trim();
    const linkedin  = document.getElementById("fLinkedin").value.trim();
    const instagram = document.getElementById("fInstagram").value.trim();

    if (!name || !role) { showToast("Name and Role are required", "error"); return; }

    const idx = parseInt(document.getElementById("editIndex").value);
    const existingPhoto = idx >= 0 ? members[idx].photo : "images/members/dummy.jpg";
    const photo = currentPhotoData || existingPhoto;

    const member = { name, role, photo, linkedin, instagram };

    if (idx === -1) {
      members.push(member);
      showToast(`${name} added!`, "success");
    } else {
      members[idx] = member;
      showToast(`${name} updated!`, "success");
    }

    persist();
    renderList();
    resetForm();
  }

  function editMember(i) {
    const currentIdx = parseInt(document.getElementById("editIndex").value);
    const isDirty = document.getElementById("fName").value.trim() !== "" ||
                    document.getElementById("fRole").value.trim() !== "";
    if (isDirty && currentIdx === -1) {
      if (!confirm("You have unsaved changes. Discard and edit this member?")) return;
    }
    const m = members[i];
    currentPhotoData = null;
    document.getElementById("editIndex").value   = i;
    document.getElementById("fName").value       = m.name;
    document.getElementById("fRole").value       = m.role;
    document.getElementById("fLinkedin").value   = m.linkedin || "";
    document.getElementById("fInstagram").value  = m.instagram || "";
    document.getElementById("formTitle").textContent = "Edit Member";
    document.getElementById("saveLabel").textContent = "Save Changes";
    document.getElementById("cancelBtn").classList.add("visible");
    showPhotoInZone(m.photo);

    const note = document.getElementById("oldPhotoNote");
    if (m.photo && !m.photo.includes("dummy") && !m.photo.startsWith("data:")) {
      note.textContent = "Uploading a new photo will replace this one.";
      note.style.display = "block";
    } else {
      note.style.display = "none";
    }

    document.querySelectorAll(".member-row").forEach(r => r.classList.remove("editing"));
    document.querySelector(`.member-row[data-index="${i}"]`)?.classList.add("editing");
    document.querySelector(".form-panel").scrollIntoView({ behavior: "smooth" });
  }

  function deleteMember(i) {
    const name = members[i].name;
    if (!confirm(`Delete ${name}?`)) return;
    members.splice(i, 1);
    persist();
    renderList();
    resetForm();
    showToast(`${name} removed`, "success");
  }

  function cancelEdit() { resetForm(); }

  function resetForm() {
    currentPhotoData = null;
    document.getElementById("editIndex").value       = -1;
    document.getElementById("fName").value           = "";
    document.getElementById("fRole").value           = "";
    document.getElementById("fLinkedin").value       = "";
    document.getElementById("fInstagram").value      = "";
    document.getElementById("formTitle").textContent = "Add New Member";
    document.getElementById("saveLabel").textContent = "Add Member";
    document.getElementById("cancelBtn").classList.remove("visible");
    document.getElementById("oldPhotoNote").style.display = "none";
    document.getElementById("fPhotoFile").value      = "";
    showPhotoInZone(null);
    document.querySelectorAll(".member-row").forEach(r => r.classList.remove("editing"));
  }

  function showPhotoInZone(src) {
    const zone    = document.getElementById("photoZone");
    const preview = document.getElementById("photoPreview");
    if (src) {
      preview.src = src;
      preview.onload  = () => zone.classList.add("has-photo");
      preview.onerror = () => zone.classList.remove("has-photo");
    } else {
      preview.src = "";
      zone.classList.remove("has-photo");
    }
  }

  function handlePhotoUpload(input) {
    if (!input.files || !input.files[0]) return;
    const reader = new FileReader();
    reader.onload = e => {
      currentPhotoData = e.target.result;
      showPhotoInZone(e.target.result);
    };
    reader.readAsDataURL(input.files[0]);
  }

  // ── Drag to reorder ───────────────────────────────────
  function onDragStart(e, i) { dragSrc = i; e.currentTarget.classList.add("dragging"); e.dataTransfer.effectAllowed = "move"; }
  function onDragOver(e)  { e.preventDefault(); e.currentTarget.classList.add("drag-over"); }
  function onDragLeave(e) { e.currentTarget.classList.remove("drag-over"); }
  function onDragEnd(e)   { e.currentTarget.classList.remove("dragging"); }
  function onDrop(e, i) {
    e.preventDefault();
    e.currentTarget.classList.remove("drag-over");
    if (dragSrc === null || dragSrc === i) return;
    const editIdx = parseInt(document.getElementById("editIndex").value);
    const moved = members.splice(dragSrc, 1)[0];
    members.splice(i, 0, moved);
    dragSrc = null;
    persist();
    renderList();
    // Re-sync editIndex if the dragged move shifted the currently-edited member
    if (editIdx >= 0) resetForm();
  }

  // ── Toast ─────────────────────────────────────────────
  function showToast(msg, type = "success") {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove("show"), 3000);
  }
</script>
</body>
</html>
